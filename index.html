<!--
=========================================================
ASTRO CLIENT SHOWCASE
Premium Modern Client UI
Made to be EASY to edit

HOW TO EDIT FEATURES:
1. Find the "CLIENT FEATURES" section
2. Add new modules like this:

{
    name: "New Module",
    description: "What the module does."
}

DONE! It auto-adds to the page.

HOW TO CHANGE CLIENT NAME:
Find:
const CLIENT_NAME = "Astro Client";

HOW TO CHANGE COLORS:
Edit CSS variables in :root
=========================================================
-->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Astro Client</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/*
=========================================================
THEME / COLORS
Easy to customize
=========================================================
*/
:root{
    --bg:#0d0d0f;
    --secondary:#151518;
    --card:#17171c;
    --border:rgba(255,255,255,.07);
    --text:#ffffff;
    --text-soft:#9d9da6;
    --hover:#222228;
    --accent:#d9d9df;
    --shadow:rgba(0,0,0,.4);
    --radius:24px;
}

/*
=========================================================
GLOBAL
=========================================================
*/
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    background:
    radial-gradient(circle at top left,
    rgba(255,255,255,.04), transparent 30%),

    radial-gradient(circle at bottom right,
    rgba(255,255,255,.03), transparent 30%),

    var(--bg);

    color:var(--text);
    overflow-x:hidden;
    min-height:100vh;
}

/*
=========================================================
BACKGROUND GLOW
=========================================================
*/
.blur-bg{
    position:fixed;
    inset:0;
    z-index:-1;
    overflow:hidden;
}

.orb{
    position:absolute;
    border-radius:50%;
    filter:blur(120px);
    opacity:.06;
    animation:float 12s ease-in-out infinite;
}

.orb1{
    width:450px;
    height:450px;
    background:#ffffff;
    top:-120px;
    left:-120px;
}

.orb2{
    width:350px;
    height:350px;
    background:#bdbdbd;
    bottom:-100px;
    right:-100px;
    animation-delay:3s;
}

@keyframes float{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(40px);
    }
}

/*
=========================================================
MAIN LAYOUT
=========================================================
*/
.wrapper{
    display:flex;
    min-height:100vh;
}

/*
=========================================================
SIDEBAR
=========================================================
*/
.sidebar{
    width:260px;
    background:rgba(255,255,255,.03);
    backdrop-filter:blur(20px);
    border-right:1px solid var(--border);
    padding:28px;
    position:fixed;
    height:100vh;
}

.logo{
    font-size:28px;
    font-weight:800;
    margin-bottom:35px;
    letter-spacing:-1px;
}

.logo span{
    color:#9f9fa8;
}

.category{
    width:100%;
    border:none;
    background:transparent;
    color:var(--text-soft);
    text-align:left;
    padding:16px 18px;
    border-radius:18px;
    margin-bottom:10px;
    cursor:pointer;
    transition:.25s ease;
    font-size:15px;
    font-weight:600;
}

.category:hover{
    background:rgba(255,255,255,.05);
    color:white;
    transform:translateX(5px);
}

.category.active{
    background:rgba(255,255,255,.08);
    color:white;
}

/*
=========================================================
CONTENT
=========================================================
*/
.content{
    margin-left:260px;
    width:100%;
    padding:50px;
}

.hero{
    margin-bottom:35px;
}

.hero h1{
    font-size:48px;
    font-weight:800;
    letter-spacing:-2px;
}

.hero p{
    color:var(--text-soft);
    margin-top:12px;
    font-size:16px;
}

/*
=========================================================
SEARCH BAR
=========================================================
*/
.search{
    width:100%;
    background:rgba(255,255,255,.04);
    border:1px solid var(--border);
    border-radius:18px;
    padding:18px 22px;
    color:white;
    outline:none;
    margin:25px 0 35px;
    font-size:15px;
}

.search:focus{
    border-color:rgba(255,255,255,.15);
}

/*
=========================================================
CATEGORY HEADER
=========================================================
*/
.category-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:24px;
}

.category-title{
    font-size:34px;
    font-weight:800;
}

.module-count{
    color:var(--text-soft);
}

/*
=========================================================
MODULE GRID
=========================================================
*/
.grid{
    display:grid;
    grid-template-columns:
    repeat(auto-fill,minmax(260px,1fr));
    gap:18px;
}

/*
=========================================================
MODULE CARD
=========================================================
*/
.card{
    background:rgba(255,255,255,.03);
    border:1px solid var(--border);
    border-radius:22px;
    padding:22px;
    transition:.25s ease;
}

.card:hover{
    transform:translateY(-6px);
    background:rgba(255,255,255,.05);
}

.card-name{
    font-size:18px;
    font-weight:700;
}

.card-desc{
    margin-top:10px;
    color:var(--text-soft);
    line-height:1.5;
    font-size:14px;
}

/*
=========================================================
RESPONSIVE
=========================================================
*/
@media(max-width:900px){
    .sidebar{
        width:100%;
        height:auto;
        position:relative;
    }

    .wrapper{
        flex-direction:column;
    }

    .content{
        margin-left:0;
        padding:25px;
    }
}
</style>
</head>

<body>

<div class="blur-bg">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
</div>

<div class="wrapper">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <div class="logo">
            Astro <span>Client</span>
        </div>

        <button class="category active"
        onclick="switchCategory('Combat', this)">
        ⚔ Combat
        </button>

        <button class="category"
        onclick="switchCategory('Movement', this)">
        🏃 Movement
        </button>

        <button class="category"
        onclick="switchCategory('Visual', this)">
        👁 Visual
        </button>

        <button class="category"
        onclick="switchCategory('Misc', this)">
        📦 Misc
        </button>

        <button class="category"
        onclick="switchCategory('Client', this)">
        ⚙ Client
        </button>

    </div>

    <!-- CONTENT -->
    <div class="content">

        <div class="hero">
            <h1>Astro Client</h1>
            <p>
                Premium Minecraft client showcase
            </p>
        </div>

        <!-- SEARCH -->
        <input
            id="searchInput"
            class="search"
            placeholder="Search modules..."
        >

        <div class="category-header">
            <div class="category-title"
            id="categoryTitle">
                Combat
            </div>

            <div class="module-count"
            id="moduleCount">
                0 Modules
            </div>
        </div>

        <div class="grid"
        id="moduleGrid"></div>

    </div>
</div>

<script>
/*
=========================================================
CLIENT SETTINGS
=========================================================
*/

const CLIENT_NAME = "Astro Client";

/*
=========================================================
CLIENT FEATURES
JUST EDIT THIS SECTION
=========================================================
*/

const modules = {

Combat: [
{
name:"KillAura",
description:"Automatically attacks enemies."
},
{
name:"Reach",
description:"Extends combat distance."
},
{
name:"Velocity",
description:"Reduces knockback."
},
{
name:"AutoTotem",
description:"Automatically equips totems."
},
{
name:"CrystalAura",
description:"Crystal PvP automation."
}
],

Movement: [
{
name:"Sprint",
description:"Automatically sprint."
},
{
name:"Fly",
description:"Enhanced movement."
},
{
name:"Step",
description:"Walk up blocks."
}
],

Visual: [
{
name:"ESP",
description:"See entities easier."
},
{
name:"FullBright",
description:"Maximum brightness."
},
{
name:"Shaders",
description:"Enhanced visuals."
}
],

Misc: [
{
name:"AutoGG",
description:"Auto sends GG."
},
{
name:"ChestStealer",
description:"Fast looting."
}
],

Client: [
{
name:"ClickGUI",
description:"Modern click GUI."
},
{
name:"HUD",
description:"Fully customizable HUD."
}
]

};

/*
=========================================================
MAIN SYSTEM
DO NOT TOUCH
=========================================================
*/

const grid =
document.getElementById("moduleGrid");

const title =
document.getElementById("categoryTitle");

const count =
document.getElementById("moduleCount");

const search =
document.getElementById("searchInput");

let currentCategory = "Combat";

function renderModules(category){

currentCategory = category;

grid.innerHTML = "";

title.textContent = category;

const query =
search.value.toLowerCase();

const filtered =
modules[category].filter(module =>
module.name
.toLowerCase()
.includes(query)
);

count.textContent =
`${filtered.length} Modules`;

filtered.forEach(module => {

const div =
document.createElement("div");

div.className = "card";

div.innerHTML = `
<div class="card-name">
${module.name}
</div>

<div class="card-desc">
${module.description}
</div>
`;

grid.appendChild(div);

});
}

function switchCategory(category, element){

document
.querySelectorAll(".category")
.forEach(button => {
button.classList
.remove("active");
});

element.classList
.add("active");

renderModules(category);
}

search.addEventListener("input", () => {
renderModules(currentCategory);
});

renderModules("Combat");
</script>

</body>
</html>
```
