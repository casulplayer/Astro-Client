<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Astro Client</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#0d0d0f;
    --secondary:#151518;
    --card:#17171c;
    --border:rgba(255,255,255,.07);
    --text:#ffffff;
    --text-soft:#9d9da6;
    --hover:#222228;
    --accent:#d9d9df;
    --shadow:rgba(0,0,0,.4);
    --radius:24px;
}


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    background:
    radial-gradient(circle at top left,
    rgba(255,255,255,.04), transparent 30%),

    radial-gradient(circle at bottom right,
    rgba(255,255,255,.03), transparent 30%),

    var(--bg);

    color:var(--text);
    overflow-x:hidden;
    min-height:100vh;
}


.blur-bg{
    position:fixed;
    inset:0;
    z-index:-1;
    overflow:hidden;
}

.orb{
    position:absolute;
    border-radius:50%;
    filter:blur(120px);
    opacity:.06;
    animation:float 12s ease-in-out infinite;
}

.orb1{
    width:450px;
    height:450px;
    background:#ffffff;
    top:-120px;
    left:-120px;
}

.orb2{
    width:350px;
    height:350px;
    background:#bdbdbd;
    bottom:-100px;
    right:-100px;
    animation-delay:3s;
}

@keyframes float{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(40px);
    }
}


.wrapper{
    display:flex;
    min-height:100vh;
}


.sidebar{
    width:260px;
    background:rgba(255,255,255,.03);
    backdrop-filter:blur(20px);
    border-right:1px solid var(--border);
    padding:28px;
    position:fixed;
    height:100vh;
}

.logo{
    font-size:28px;
    font-weight:800;
    margin-bottom:35px;
    letter-spacing:-1px;
}

.logo span{
    color:#9f9fa8;
}

.category{
    width:100%;
    border:none;
    background:transparent;
    color:var(--text-soft);
    text-align:left;
    padding:16px 18px;
    border-radius:18px;
    margin-bottom:10px;
    cursor:pointer;
    transition:.25s ease;
    font-size:15px;
    font-weight:600;
}

.category:hover{
    background:rgba(255,255,255,.05);
    color:white;
    transform:translateX(5px);
}

.category.active{
    background:rgba(255,255,255,.08);
    color:white;
}


.content{
    margin-left:260px;
    width:100%;
    padding:50px;
}

.hero{
    margin-bottom:35px;
}

.hero h1{
    font-size:48px;
    font-weight:800;
    letter-spacing:-2px;
}

.hero p{
    color:var(--text-soft);
    margin-top:12px;
    font-size:16px;
}


.search{
    width:100%;
    background:rgba(255,255,255,.04);
    border:1px solid var(--border);
    border-radius:18px;
    padding:18px 22px;
    color:white;
    outline:none;
    margin:25px 0 35px;
    font-size:15px;
}

.search:focus{
    border-color:rgba(255,255,255,.15);
}


.category-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:24px;
}

.category-title{
    font-size:34px;
    font-weight:800;
}

.module-count{
    color:var(--text-soft);
}

.grid{
    display:grid;
    grid-template-columns:
    repeat(auto-fill,minmax(260px,1fr));
    gap:18px;
}


.card{
    background:rgba(255,255,255,.03);
    border:1px solid var(--border);
    border-radius:22px;
    padding:22px;
    transition:.25s ease;
}

.card:hover{
    transform:translateY(-6px);
    background:rgba(255,255,255,.05);
}

.card-name{
    font-size:18px;
    font-weight:700;
}

.card-desc{
    margin-top:10px;
    color:var(--text-soft);
    line-height:1.5;
    font-size:14px;
}


@media(max-width:900px){
    .sidebar{
        width:100%;
        height:auto;
        position:relative;
    }

    .wrapper{
        flex-direction:column;
    }

    .content{
        margin-left:0;
        padding:25px;
    }
}
</style>
</head>

<body>

<div class="blur-bg">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
</div>

<div class="wrapper">

    <div class="sidebar">

        <div class="logo">
            Astro <span>Client</span>
        </div>

        <button class="category active"
        onclick="switchCategory('Combat', this)">
        Combat
        </button>

        <button class="category"
        onclick="switchCategory('Movement', this)">
        Movement
        </button>

        <button class="category"
        onclick="switchCategory('Visual', this)">
        Visual
        </button>

        <button class="category"
        onclick="switchCategory('Misc', this)">
        Misc
        </button>

        <button class="category"
        onclick="switchCategory('Client', this)">
        Client
        </button>

    </div>


    <div class="content">

        <div class="hero">
            <h1>Astro Client</h1>
            <p>
                Premium Minecraft client showcase
            </p>
        </div>

        <input
            id="searchInput"
            class="search"
            placeholder="Search modules..."
        >

        <div class="category-header">
            <div class="category-title"
            id="categoryTitle">
                Combat
            </div>

            <div class="module-count"
            id="moduleCount">
                0 Modules
            </div>
        </div>

        <div class="grid"
        id="moduleGrid"></div>

    </div>
</div>

<script>

const CLIENT_NAME = "Astro Client V0.0.3";

const modules = {

Combat: [
{name:"AntiBot",description:"Detects and avoids fake entities."},
{name:"KillAura",description:"Automatically attacks nearby enemies."},

{name:"AutoAnchor",description:"Automates anchor placement and detonation."},
{name:"MaceAura",description:"Automatically attacks using mace combat."},
{name:"MaceSwap",description:"Quickly swaps to mace when needed."},
{name:"AutoCart",description:"Automates minecart combat tactics."}
],

Movement: [
{name:"AntiAFK",description:"Prevents AFK detection."},
{name:"Flight",description:"Allows free movement through the air."},
{name:"NoFall",description:"Prevents fall damage."},
{name:"NoSlow",description:"Removes movement slowdown."},
{name:"Jesus",description:"Walk on water surfaces."},
{name:"Scaffold",description:"Automatically places blocks while moving."},
{name:"Spider",description:"Climb walls like a spider."},
{name:"Step",description:"Walk up blocks automatically."},
{name:"Speed",description:"Increases movement speed."},
{name:"AutoSprint",description:"Automatically sprint."},

],

],

Client: [

{name:"Coordinates",description:"Displays player coordinates."},

{name:"Destroy",description:"Utility destruction tools."},
{name:"NoScreenShare",description:"Protects client visibility."},
{name:"ArrayList",description:"Displays enabled modules."}
]

};    
    
const grid =
document.getElementById("moduleGrid");

const title =
document.getElementById("categoryTitle");

const count =
document.getElementById("moduleCount");

const search =
document.getElementById("searchInput");

let currentCategory = "Combat";

function renderModules(category){

currentCategory = category;

grid.innerHTML = "";

title.textContent = category;

const query =
search.value.toLowerCase();

const filtered =
modules[category].filter(module =>
module.name
.toLowerCase()
.includes(query)
);

count.textContent =
`${filtered.length} Modules`;

filtered.forEach(module => {

const div =
document.createElement("div");

div.className = "card";

div.innerHTML = `
<div class="card-name">
${module.name}
</div>

<div class="card-desc">
${module.description}
</div>
`;

grid.appendChild(div);

});
}

function switchCategory(category, element){

document
.querySelectorAll(".category")
.forEach(button => {
button.classList
.remove("active");
});

element.classList
.add("active");

renderModules(category);
}

search.addEventListener("input", () => {
renderModules(currentCategory);
});

renderModules("Combat");
</script>

</body>
</html>
